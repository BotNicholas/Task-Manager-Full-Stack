spring:
  application:
    name: TaskManager

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:54321}/${DB_NAME:tasks}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:password}
  flyway:
    locations: classpath:db/migrations
    schemas: public
    url: ${spring.datasource.url}
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}

server:
  port: ${APP_PORT:8080}

cors:
  allow-credentials: true
  origins: "http://localhost:3000/, http://localhost:5500, http://localhost:63343"
  headers: "*"
  methods: "*"